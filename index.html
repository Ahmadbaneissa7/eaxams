<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offline Student Exam</title>

<style>
body{
font-family:Arial;
background:#eef3f7;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{text-align:center;color:#2c3e50;}

input[type="text"]{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
background:#27ae60;
color:white;
font-size:18px;
cursor:pointer;
}

.q{
margin:15px 0;
padding:15px;
background:#f9f9f9;
border-left:4px solid #27ae60;
border-radius:8px;
}

label{
display:block;
margin:6px 0;
padding:8px;
background:white;
border:1px solid #ddd;
border-radius:6px;
cursor:pointer;
}

#exam{display:none;}

#result{
margin-top:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>⚜️ Student Offline Exam</h1>

<!-- START SCREEN -->
<div id="start">
<h3>Enter Your Name</h3>
<input type="text" id="studentName" placeholder="Your name">
<button onclick="startExam()">Start Exam</button>
</div>

<!-- EXAM -->
<div id="exam">

<div class="q">
<p>1. When did scouting start?</p>
<label><input type="radio" name="q1" value="1">1907</label>
<label><input type="radio" name="q1" value="0">1950</label>
</div>

<div class="q">
<p>2. Main goal of scouts?</p>
<label><input type="radio" name="q2" value="1">Community service</label>
<label><input type="radio" name="q2" value="0">Money</label>
</div>

<div class="q">
<p>3. First scout camp?</p>
<label><input type="radio" name="q3" value="1">England</label>
<label><input type="radio" name="q3" value="0">USA</label>
</div>

<div class="q">
<p>4. Scouts learn first aid?</p>
<label><input type="radio" name="q4" value="1">Yes</label>
<label><input type="radio" name="q4" value="0">No</label>
</div>

<div class="q">
<p>5. Scout motto?</p>
<label><input type="radio" name="q5" value="1">Be Prepared</label>
<label><input type="radio" name="q5" value="0">Be Rich</label>
</div>

<button onclick="finishExam()">Finish Exam</button>

<div id="result"></div>

</div>
</div>

<script>

let student = "";

/* 🔒 منع إعادة الامتحان بعد الريفريش */
if(localStorage.getItem("exam_done") === "true"){
document.body.innerHTML = `
<h2 style="text-align:center;margin-top:80px;color:red;">
❌ You already completed this exam
</h2>`;
}

function startExam(){

if(localStorage.getItem("exam_done") === "true"){
return;
}

student = document.getElementById("studentName").value;

if(student.trim() === ""){
alert("Enter your name");
return;
}

document.getElementById("start").style.display = "none";
document.getElementById("exam").style.display = "block";
}

function finishExam(){

let score = 0;

for(let i=1;i<=5;i++){
let ans = document.querySelector('input[name="q'+i+'"]:checked');

if(!ans){
alert("Please answer all questions");
return;
}

if(ans.value == "1") score++;
}

/* 🔒 قفل الامتحان نهائيًا */
document.querySelectorAll("input").forEach(i => i.disabled = true);

/* 🔒 تسجيل أنه انتهى */
localStorage.setItem("exam_done","true");

document.getElementById("result").innerHTML =
"✅ Exam Finished<br>" +
"Student: " + student + "<br>" +
"Score: " + score + " / 5<br>";

if(score == 5){
document.getElementById("result").innerHTML += "<br>🌟 Excellent!";
}else if(score >= 3){
document.getElementById("result").innerHTML += "<br>👍 Good job!";
}else{
document.getElementById("result").innerHTML += "<br>📚 Keep practicing!";
}

}

</script>

</body>
</html>
