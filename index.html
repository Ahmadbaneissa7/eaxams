<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offline Exam System</title>

<style>
body{font-family:Arial;background:#eef3f7;padding:20px;}
.container{max-width:900px;margin:auto;background:white;padding:25px;border-radius:12px;}
h1{text-align:center;}

input{width:100%;padding:10px;margin:10px 0;border-radius:6px;border:1px solid #ccc;}

button{width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:6px;margin-top:10px;cursor:pointer;}

.q{background:#f9f9f9;padding:10px;margin:10px 0;border-left:4px solid green;}

#exam,#teacherPanel{display:none;}
#result{text-align:center;font-size:20px;margin-top:15px;}
</style>
</head>

<body>

<div class="container">

<h1>⚜️ Exam System</h1>

<!-- STUDENT LOGIN -->
<div id="start">
<h3>Enter Your Name</h3>
<input type="text" id="studentName">
<button onclick="startExam()">Start Exam</button>
</div>

<!-- EXAM -->
<div id="exam">

<div class="q">
<p>1. When did scouting start?</p>
<label><input type="radio" name="q1" value="1">1907</label>
<label><input type="radio" name="q1" value="0">1950</label>
</div>

<div class="q">
<p>2. Main goal?</p>
<label><input type="radio" name="q2" value="1">Community service</label>
<label><input type="radio" name="q2" value="0">Money</label>
</div>

<button onclick="finishExam()">Finish Exam</button>

<div id="result"></div>

</div>

<!-- TEACHER LOGIN -->
<div id="teacherLogin">
<h3>Teacher Login</h3>
<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- TEACHER PANEL -->
<div id="teacherPanel">
<h3>Teacher Panel</h3>
<div id="teacherData"></div>
<button onclick="resetExam()">Reset Exam</button>
</div>

</div>

<script>

// 🔒 إذا الامتحان مخلص → حول على لوجن الأستاذ
if(localStorage.getItem("exam_done") === "true"){
document.getElementById("start").style.display="none";
document.getElementById("teacherLogin").style.display="block";
}

let student="";

function startExam(){
student=document.getElementById("studentName").value;

if(student.trim()==""){
alert("Enter name");
return;
}

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
}

function finishExam(){

let score=0;

for(let i=1;i<=2;i++){
let ans=document.querySelector('input[name="q'+i+'"]:checked');

if(!ans){
alert("Answer all questions");
return;
}

if(ans.value=="1") score++;
}

// تخزين البيانات
localStorage.setItem("exam_done","true");
localStorage.setItem("student_name",student);
localStorage.setItem("score",score);

// قفل
document.querySelectorAll("input").forEach(i=>i.disabled=true);

document.getElementById("result").innerHTML =
"Exam Finished<br>Score: "+score+"/2";
}

// تسجيل دخول الأستاذ
function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){

document.getElementById("teacherLogin").style.display="none";
document.getElementById("teacherPanel").style.display="block";

// عرض البيانات
document.getElementById("teacherData").innerHTML =
"Student: "+localStorage.getItem("student_name")+"<br>"+
"Score: "+localStorage.getItem("score");

}else{
alert("Wrong login");
}
}

// إعادة الامتحان
function resetExam(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
